version: "3.9"

services:

  # -----------------------------------------------------------------------
  # Qdrant vector database
  # -----------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # -----------------------------------------------------------------------
  # RAG FastAPI backend
  # Reads GEMINI_API_KEY / GROQ_API_KEY from .env
  # Connects to the Qdrant container via its service name
  # -----------------------------------------------------------------------
  api:
    build: .
    restart: unless-stopped
    ports:
      - "8000:7860"        # localhost:8000 → container:7860
    env_file:
      - .env               # loads GEMINI_API_KEY, GROQ_API_KEY, etc.
    environment:
      - QDRANT_URL=http://qdrant:6333   # override .env so API talks to container
      - PORT=7860
    depends_on:
      qdrant:
        condition: service_healthy

volumes:
  qdrant_data:
